# Sample configuration for cummand.
# Copy this to your project root and adjust as needed.
# See `cummand --help` for more information.

[defaults]
server-url = "ws://localhost:8080"
public-url = "http://{code}.localhost:8080"
auto-open = false
log-level = "info"
retry-limit = 5

[auth]
token = ""

[alias.frontend]
url = "http://localhost:3000"
description = "Main Next.js app"

[alias.backend]
url = "http://localhost:8000"
description = "Python FastAPI service"
