# Sample configuration for cummand.
# After `cummand config init --global`, your global config at
# ~/.cummand/cummand.config.toml already points to the public server.
# This file shows additional options.

[defaults]
server-url = "wss://cummand.onrender.com"
public-url = "https://cummand.onrender.com/{code}"
auto-open = false
log-level = "info"
retry-limit = 5

[alias.frontend]
url = "http://localhost:3000"
description = "Main Next.js app"

[alias.backend]
url = "http://localhost:8000"
description = "Python FastAPI service"
